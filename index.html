<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Material</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="card">
        
        <img id="companyLogo" src="nsg.png" alt="Company Logo">

        <h1 id="materialDescription">
            Loading...
        </h1>

        <img id="photo" alt="Material Photo">

        <table>
            <tr>
                <td><b>Material Number</b></td>
                <td id="materialNumber"></td>
            </tr>
            <tr>
                <td><b>Plant</b></td>
                <td id="plant"></td>
            </tr>
            <tr>
                <td><b>Storage Location</b></td>
                <td id="storageLocation"></td>
            </tr>
            <tr>
                <td><b>Base Unit</b></td>
                <td id="baseUnit"></td>
            </tr>
            <tr>
                <td><b>Value (RM)</b></td>
                <td id="valueRM"></td>
            </tr>
            <tr>
                <td><b>Machine</b></td>
                <td id="machine"></td>
            </tr>
            <tr>
                <td><b>Comments</b></td>
                <td id="comments"></td>
            </tr>
        </table>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
